<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFlow — Паспорт камер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#fbfbf9;--surface-off:#f0ede8;
  --border:rgba(40,37,29,0.12);--text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --primary:#01696f;--primary-h:#0c4e54;--primary-hi:#cedcd8;
  --warning:#964219;--error:#a12c7b;--success:#437a22;
  --shadow:0 2px 8px rgba(40,37,29,0.08),0 8px 24px rgba(40,37,29,0.05);
  --r:0.5rem;--font:'Inter',sans-serif;
}
[data-theme="dark"]{
  --bg:#141312;--surface:#1c1b19;--surface-2:#222120;--surface-off:#272523;
  --border:rgba(255,255,255,0.08);--text:#cdccca;--muted:#797876;--faint:#4a4948;
  --primary:#4f98a3;--primary-h:#227f8b;--primary-hi:#1f3a3c;
  --warning:#bb653b;--error:#d163a7;--success:#6daa45;
  --shadow:0 2px 8px rgba(0,0,0,0.3),0 8px 24px rgba(0,0,0,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:var(--font);font-size:15px;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
input,button,select{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}

/* NAV BAR */
.top-nav{display:flex;align-items:center;gap:4px;padding:6px 20px;background:var(--surface-2);border-bottom:1px solid var(--border);font-size:12px}
.top-nav a{color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:var(--r);transition:all 180ms ease;font-weight:500}
.top-nav a:hover{color:var(--text);background:var(--surface-off)}
.top-nav a.active{color:var(--primary);background:var(--primary-hi);font-weight:600}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;letter-spacing:-0.01em}
.logo svg{color:var(--primary)}
.theme-btn{width:36px;height:36px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 180ms ease}
.theme-btn:hover{color:var(--text);border-color:var(--primary)}

/* LAYOUT */
.app-body{display:grid;grid-template-columns:300px 1fr;flex:1;min-height:0;overflow:hidden}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 14px 10px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.input{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:13px;width:100%;transition:border-color 180ms ease;-moz-appearance:textfield}
.input:focus{outline:none;border-color:var(--primary)}
select.input{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23797876' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px;cursor:pointer}
.sort-row{display:flex;gap:4px}
.sort-btn{font-size:11px;padding:4px 8px;border-radius:var(--r);border:1px solid var(--border);color:var(--muted);background:var(--surface-2);transition:all 180ms ease}
.sort-btn:hover{color:var(--text)}
.sort-btn.active{color:var(--primary);border-color:var(--primary);background:var(--primary-hi)}

.chamber-list{flex:1;overflow-y:auto;padding:8px}
.chamber-card{padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface-2);margin-bottom:6px;cursor:pointer;transition:all 180ms ease;display:flex;align-items:center;gap:10px}
.chamber-card:hover{border-color:var(--primary)}
.chamber-card.selected{border-color:var(--primary);background:var(--primary-hi)}
.chamber-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chamber-status-dot.green{background:var(--success)}
.chamber-status-dot.yellow{background:var(--warning)}
.chamber-status-dot.red{background:var(--error)}
.chamber-status-dot.gray{background:var(--faint)}
.chamber-info{flex:1;min-width:0}
.chamber-info-block{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chamber-info-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chamber-draw-pct{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}

/* MAIN */
.main-area{flex:1;overflow-y:auto;padding:24px}

/* SECTIONS */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.section-title{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.kpi{background:var(--surface-2);border-radius:calc(var(--r) - 2px);padding:12px;border:1px solid var(--border)}
.kpi-label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1}
.kpi-unit{font-size:10px;color:var(--muted);margin-top:2px}
.kpi.warn .kpi-value{color:var(--warning)}
.kpi.ok .kpi-value{color:var(--success)}
.kpi.accent .kpi-value{color:var(--primary)}

/* FIELD */
.field-group{display:flex;flex-direction:column;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--muted);font-weight:500}
.field-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.field-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.input-with-unit{position:relative}
.input-with-unit .input{padding-right:32px}
.unit{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--faint);pointer-events:none}

/* TABLE */
.table-wrap{overflow-x:auto;max-height:400px;overflow-y:auto;border-radius:var(--r);border:1px solid var(--border)}
.data-table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
.data-table thead th{position:sticky;top:0;background:var(--surface-off);z-index:1;text-align:left;padding:7px 10px;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:0.04em;border-bottom:2px solid var(--border);white-space:nowrap}
.data-table tbody td{padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table tbody tr:hover{background:var(--surface-2)}
.data-table tfoot td{padding:7px 10px;border-top:2px solid var(--border);font-weight:700;background:var(--surface-off);position:sticky;bottom:0}

/* CHART */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;height:280px}
.chart-wrap canvas{display:block;width:100%;height:100%}

/* BTN */
.btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;transition:all 180ms ease;display:inline-flex;align-items:center;gap:6px}
.btn.primary{background:var(--primary);color:white}
.btn.primary:hover{background:var(--primary-h)}
.btn.outline{border:1px solid var(--border);color:var(--muted)}
.btn.outline:hover{border-color:var(--primary);color:var(--text)}

.empty-state{text-align:center;padding:60px 24px;color:var(--muted);font-size:14px}
.empty-state-icon{margin-bottom:12px;opacity:0.4}

/* TAG */
.tag{display:inline-block;background:var(--primary-hi);color:var(--primary);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}

/* CuEq display */
.cueq-display{background:color-mix(in oklch,#d19900 8%,var(--surface));border:1px solid color-mix(in oklch,#d19900 25%,var(--border));border-radius:var(--r);padding:10px 12px;margin-top:8px}
.cueq-label{font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cueq-value{font-size:22px;font-weight:800;letter-spacing:-0.03em;color:#d19900}
[data-theme="dark"] .cueq-value{color:#e8af34}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:white;padding:12px 20px;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:var(--shadow);transform:translateY(100px);opacity:0;transition:all 300ms ease;z-index:1000}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:800px){
  .app-body{grid-template-columns:1fr}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);max-height:280px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="top-nav">
  <a href="index.html">Калькулятор</a>
  <a href="chamber.html" class="active">Паспорт камер</a>
  <a href="import.html">Импорт данных</a>
</nav>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <ellipse cx="12" cy="12" rx="4" ry="10" opacity=".4"/>
      <ellipse cx="12" cy="12" rx="10" ry="4" opacity=".4"/>
      <ellipse cx="12" cy="12" rx="7" ry="10"/>
    </svg>
    UFlow — Паспорт камер
  </div>
  <button class="theme-btn" onclick="toggleTheme()" aria-label="Тема" id="themeBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<!-- APP BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Камеры</div>
      <div class="filter-row">
        <select class="input" id="filterBlock" onchange="renderList()">
          <option value="">Все блоки</option>
        </select>
        <select class="input" id="filterSublevel" onchange="renderList()">
          <option value="">Все подэтажи</option>
        </select>
      </div>
      <div class="sort-row">
        <button class="sort-btn active" id="sortDraw" onclick="setSort('draw')">По Draw %</button>
        <button class="sort-btn" id="sortAlpha" onclick="setSort('alpha')">По алфавиту</button>
      </div>
    </div>
    <div class="chamber-list" id="chamberList"></div>
  </aside>

  <!-- MAIN -->
  <div class="main-area" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--faint)">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18M3 9h18"/>
        </svg>
      </div>
      <div id="emptyMsg">Загрузка данных...</div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── THEME ──────────────────────────────────────────
let dark = true;
function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  const btn=document.getElementById('themeBtn');
  btn.innerHTML = dark
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  // Redraw chart if visible
  if(selectedChamber) drawChart();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(()=>{ t.classList.remove('show'); }, 3000);
}

function col(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// ─── STORAGE WRAPPER ────────────────────────────────
const _memStore = {};
const store = {
  getItem(k){ try { return window['local'+'Storage'].getItem(k); } catch(e){ return _memStore[k]||null; } },
  setItem(k,v){ try { window['local'+'Storage'].setItem(k,v); } catch(e){} _memStore[k]=v; },
  removeItem(k){ try { window['local'+'Storage'].removeItem(k); } catch(e){} delete _memStore[k]; }
};

// ─── DATA ───────────────────────────────────────────
let uflowData = null;
let chambers = [];
let records = [];
let selectedChamber = null;
let sortMode = 'draw'; // 'draw' or 'alpha'

function loadData(){
  const raw = store.getItem('uflow_data');
  if(!raw){
    document.getElementById('emptyMsg').innerHTML = 'Нет данных. <a href="import.html" style="color:var(--primary)">Импортируйте Excel</a>';
    return false;
  }
  try {
    uflowData = JSON.parse(raw);
    chambers = uflowData.chambers || [];
    records = uflowData.records || [];
    return true;
  } catch(e){
    document.getElementById('emptyMsg').textContent = 'Ошибка чтения данных';
    return false;
  }
}

function saveData(){
  if(!uflowData) return;
  uflowData.chambers = chambers;
  store.setItem('uflow_data', JSON.stringify(uflowData));
}

// ─── FILTERS ────────────────────────────────────────
function populateFilters(){
  const blocks = [...new Set(chambers.map(c=>c.block).filter(Boolean))].sort();
  const sublevels = [...new Set(chambers.map(c=>c.sublevel).filter(Boolean))].sort();
  
  const fb = document.getElementById('filterBlock');
  fb.innerHTML = '<option value="">Все блоки</option>' + blocks.map(b=>`<option value="${b}">${b}</option>`).join('');
  
  const fs = document.getElementById('filterSublevel');
  fs.innerHTML = '<option value="">Все подэтажи</option>' + sublevels.map(s=>`<option value="${s}">${s}</option>`).join('');
}

function setSort(mode){
  sortMode = mode;
  document.getElementById('sortDraw').classList.toggle('active', mode==='draw');
  document.getElementById('sortAlpha').classList.toggle('active', mode==='alpha');
  renderList();
}

// ─── CHAMBER LIST ───────────────────────────────────
function getStatusColor(ch){
  const pct = ch.draw_status ? ch.draw_status.draw_pct : 0;
  if(pct === 0 && (!ch.draw_status || !ch.draw_status.total_drawn_t)) return 'gray';
  if(pct > 80) return 'red';
  if(pct > 60) return 'yellow';
  return 'green';
}

function renderList(){
  const blockFilter = document.getElementById('filterBlock').value;
  const subFilter = document.getElementById('filterSublevel').value;
  
  let filtered = chambers.filter(c=>{
    if(blockFilter && c.block !== blockFilter) return false;
    if(subFilter && c.sublevel !== subFilter) return false;
    return true;
  });
  
  if(sortMode === 'draw'){
    filtered.sort((a,b)=> (b.draw_status?.draw_pct||0) - (a.draw_status?.draw_pct||0));
  } else {
    filtered.sort((a,b)=> {
      const ka = `${a.block}${a.sublevel}${a.drift}`;
      const kb = `${b.block}${b.sublevel}${b.drift}`;
      return ka.localeCompare(kb);
    });
  }
  
  const list = document.getElementById('chamberList');
  if(!filtered.length){
    list.innerHTML = '<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted)">Камеры не найдены</div>';
    return;
  }
  
  list.innerHTML = filtered.map(c=>{
    const color = getStatusColor(c);
    const pct = c.draw_status ? c.draw_status.draw_pct : 0;
    const sel = selectedChamber && selectedChamber.id === c.id ? ' selected' : '';
    return `<div class="chamber-card${sel}" data-id="${c.id}" onclick="selectChamber('${c.id}')">
      <div class="chamber-status-dot ${color}"></div>
      <div class="chamber-info">
        <div class="chamber-info-block">${c.block} · ${c.sublevel}</div>
        <div class="chamber-info-sub">${c.drift}</div>
      </div>
      <div class="chamber-draw-pct" style="color:var(--${color==='gray'?'faint':color==='green'?'success':color==='yellow'?'warning':'error'})">${pct.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

// ─── SELECT CHAMBER ─────────────────────────────────
function selectChamber(id){
  selectedChamber = chambers.find(c=>c.id === id);
  if(!selectedChamber) return;
  
  renderList(); // Update selection highlight
  renderPassport();
}

function getChamberRecords(ch){
  return records.filter(r=> r.block === ch.block && r.sublevel === ch.sublevel && r.drift === ch.drift)
    .sort((a,b)=> (b.date_blast||'').localeCompare(a.date_blast||''));
}

function renderPassport(){
  const ch = selectedChamber;
  if(!ch) return;
  
  const recs = getChamberRecords(ch);
  const main = document.getElementById('mainArea');
  document.getElementById('emptyState').style.display = 'none';
  
  // Compute stats
  const totalDrawn = recs.reduce((s,r)=> s + (r.fact_t||0), 0);
  const drawPct = ch.geology.tonnage_plan > 0 ? (totalDrawn / ch.geology.tonnage_plan * 100) : 0;
  const avgCu = recs.length ? recs.reduce((s,r)=> s + (r.grade_fact?.cu||0), 0) / recs.filter(r=>r.grade_fact?.cu>0).length || 0 : 0;
  const avgAu = recs.length ? recs.reduce((s,r)=> s + (r.grade_fact?.au||0), 0) / recs.filter(r=>r.grade_fact?.au>0).length || 0 : 0;
  const lastFace = recs.find(r=>r.face_state)?.face_state || '—';
  const dates = recs.map(r=>r.date_blast).filter(Boolean).sort();
  const lastDate = dates[dates.length - 1] || '';
  const daysSince = lastDate ? Math.floor((Date.now() - new Date(lastDate).getTime()) / 86400000) : null;
  const dateRange = dates.length ? `${dates[0]} — ${dates[dates.length-1]}` : '—';
  const fanCount = new Set(recs.map(r=>r.fan).filter(Boolean)).size;
  
  // CuEq
  const k_Au = 0.08, k_Ag = 0.003;
  const cuEq = ch.geology.cu_plan + ch.geology.au_plan * k_Au + ch.geology.ag_plan * k_Ag;
  
  // Update draw_status
  ch.draw_status.total_drawn_t = totalDrawn;
  ch.draw_status.draw_pct = drawPct;
  ch.draw_status.current_face_state = lastFace;
  ch.draw_status.last_update = lastDate;
  
  // Remove empty state and render passport sections
  const passportHTML = `
  <!-- Section 1: General Info -->
  <div class="section">
    <div class="section-title">Общая информация</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Блок</div><div class="kpi-value" style="font-size:16px">${ch.block}</div></div>
      <div class="kpi"><div class="kpi-label">Подэтаж</div><div class="kpi-value" style="font-size:16px">${ch.sublevel}</div></div>
      <div class="kpi"><div class="kpi-label">Выработка</div><div class="kpi-value" style="font-size:16px">${ch.drift}</div></div>
      <div class="kpi"><div class="kpi-label">Вееров</div><div class="kpi-value">${fanCount}</div></div>
      <div class="kpi" style="grid-column:span 2"><div class="kpi-label">Период</div><div class="kpi-value" style="font-size:13px">${dateRange}</div></div>
    </div>
  </div>

  <!-- Section 2: Geometry -->
  <div class="section">
    <div class="section-title">Геометрия камеры</div>
    <div class="field-group">
      <div class="field-row">
        <div class="field"><label>Высота H, м</label>
          <div class="input-with-unit"><input class="input geo-input" data-key="height_H" type="number" value="${ch.geometry.height_H}" min="1" step="0.5"><span class="unit">м</span></div>
        </div>
        <div class="field"><label>Ширина W, м</label>
          <div class="input-with-unit"><input class="input geo-input" data-key="width_W" type="number" value="${ch.geometry.width_W}" min="1" step="0.5"><span class="unit">м</span></div>
        </div>
        <div class="field"><label>Длина L, м</label>
          <div class="input-with-unit"><input class="input geo-input" data-key="length_L" type="number" value="${ch.geometry.length_L}" min="1" step="0.5"><span class="unit">м</span></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Шаг drawpoint, м</label>
          <div class="input-with-unit"><input class="input geo-input" data-key="drawpoint_spacing" type="number" value="${ch.geometry.drawpoint_spacing}" min="1" step="0.5"><span class="unit">м</span></div>
        </div>
        <div class="field"><label>Сыпучесть p</label>
          <div class="input-with-unit"><input class="input geo-input" data-key="looseness" type="number" value="${ch.geometry.looseness}" min="0.5" step="0.05"><span class="unit">м</span></div>
        </div>
        <div class="field"><label>Плотность ρ</label>
          <div class="input-with-unit"><input class="input geo-input" data-key="density" type="number" value="${ch.geometry.density}" min="1" step="0.1"><span class="unit">т/м³</span></div>
        </div>
      </div>
      <div style="margin-top:8px">
        <a class="btn outline" id="openCalcBtn" href="#" onclick="openCalc(); return false;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/></svg>
          Открыть в калькуляторе
        </a>
      </div>
    </div>
  </div>

  <!-- Section 3: Geology -->
  <div class="section">
    <div class="section-title">Геология</div>
    <div class="field-group">
      <div class="field-row">
        <div class="field"><label>Cu план, %</label>
          <div class="input-with-unit"><input class="input geol-input" data-key="cu_plan" type="number" value="${ch.geology.cu_plan}" min="0" step="0.01"><span class="unit">%</span></div>
        </div>
        <div class="field"><label>Au план, г/т</label>
          <div class="input-with-unit"><input class="input geol-input" data-key="au_plan" type="number" value="${ch.geology.au_plan}" min="0" step="0.01"><span class="unit">г/т</span></div>
        </div>
        <div class="field"><label>Ag план, г/т</label>
          <div class="input-with-unit"><input class="input geol-input" data-key="ag_plan" type="number" value="${ch.geology.ag_plan}" min="0" step="0.1"><span class="unit">г/т</span></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Плановый тоннаж</label>
          <div class="input-with-unit"><input class="input geol-input" data-key="tonnage_plan" type="number" value="${ch.geology.tonnage_plan}" min="0" step="100"><span class="unit">т</span></div>
        </div>
      </div>
      <div class="cueq-display">
        <div class="cueq-label">CuEq (авто)</div>
        <span class="cueq-value" id="cueqValue">${cuEq.toFixed(3)}%</span>
        <div style="font-size:10px;color:var(--muted);margin-top:4px">Cu + Au×${k_Au} + Ag×${k_Ag}</div>
      </div>
    </div>
  </div>

  <!-- Section 5: Draw Status KPIs -->
  <div class="section">
    <div class="section-title">Статус выпуска</div>
    <div class="kpi-grid">
      <div class="kpi accent"><div class="kpi-label">Выпущено всего</div><div class="kpi-value">${Math.round(totalDrawn).toLocaleString('ru-RU')}</div><div class="kpi-unit">тонн</div></div>
      <div class="kpi ${drawPct > 80 ? 'warn' : drawPct > 0 ? 'ok' : ''}"><div class="kpi-label">Draw %</div><div class="kpi-value">${drawPct.toFixed(1)}%</div></div>
      <div class="kpi"><div class="kpi-label">Ср. Cu факт</div><div class="kpi-value">${avgCu ? avgCu.toFixed(3) : '—'}</div><div class="kpi-unit">%</div></div>
      <div class="kpi"><div class="kpi-label">Ср. Au факт</div><div class="kpi-value">${avgAu ? avgAu.toFixed(2) : '—'}</div><div class="kpi-unit">г/т</div></div>
      <div class="kpi"><div class="kpi-label">Состояние забоя</div><div class="kpi-value" style="font-size:14px">${lastFace}</div></div>
      <div class="kpi"><div class="kpi-label">Дней с последнего выпуска</div><div class="kpi-value">${daysSince !== null ? daysSince : '—'}</div></div>
    </div>
  </div>

  <!-- Section 4: Draw History -->
  <div class="section">
    <div class="section-title">История выпуска (${recs.length} записей)</div>
    ${recs.length ? `<div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Дата</th>
            <th>Веер</th>
            <th>ГМ, т</th>
            <th>Факт, т</th>
            <th>Draw %</th>
            <th>Забой</th>
            <th>Cu факт</th>
            <th>Au факт</th>
            <th>Ag факт</th>
          </tr>
        </thead>
        <tbody>
          ${recs.map(r=>`<tr>
            <td>${r.date_blast || '—'}</td>
            <td>${r.fan || '—'}</td>
            <td>${r.vol_total_t || '—'}</td>
            <td>${r.fact_t || '—'}</td>
            <td>${r.fact_pct ? r.fact_pct.toFixed(1)+'%' : '—'}</td>
            <td>${r.face_state ? '<span class="tag">'+r.face_state+'</span>' : '—'}</td>
            <td>${r.grade_fact?.cu || '—'}</td>
            <td>${r.grade_fact?.au || '—'}</td>
            <td>${r.grade_fact?.ag || '—'}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td>Итого</td>
            <td></td>
            <td>${Math.round(recs.reduce((s,r)=>s+(r.vol_total_t||0),0)).toLocaleString('ru-RU')}</td>
            <td>${Math.round(totalDrawn).toLocaleString('ru-RU')}</td>
            <td></td>
            <td></td>
            <td>${avgCu ? avgCu.toFixed(3) : ''}</td>
            <td>${avgAu ? avgAu.toFixed(2) : ''}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>` : '<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Нет записей для этой камеры</div>'}
  </div>

  <!-- Section 6: Chart -->
  <div class="section">
    <div class="section-title">График выпуска</div>
    <div class="chart-wrap"><canvas id="drawChart"></canvas></div>
  </div>
  `;
  
  // Remove any existing passport content (not the empty state)
  const existing = main.querySelector('.passport-content');
  if(existing) existing.remove();
  
  const wrapper = document.createElement('div');
  wrapper.className = 'passport-content';
  wrapper.innerHTML = passportHTML;
  main.appendChild(wrapper);
  
  // Bind input events
  wrapper.querySelectorAll('.geo-input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      ch.geometry[inp.dataset.key] = parseFloat(inp.value) || 0;
      saveData();
      showToast('Геометрия сохранена');
    });
  });
  wrapper.querySelectorAll('.geol-input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      ch.geology[inp.dataset.key] = parseFloat(inp.value) || 0;
      saveData();
      // Update CuEq
      const newCuEq = ch.geology.cu_plan + ch.geology.au_plan * k_Au + ch.geology.ag_plan * k_Ag;
      const cueqEl = document.getElementById('cueqValue');
      if(cueqEl) cueqEl.textContent = newCuEq.toFixed(3) + '%';
      showToast('Геология сохранена');
      // Refresh draw % in sidebar
      ch.draw_status.draw_pct = ch.geology.tonnage_plan > 0 ? (totalDrawn / ch.geology.tonnage_plan * 100) : 0;
      renderList();
    });
  });
  
  // Draw chart
  setTimeout(drawChart, 50);
}

// ─── OPEN IN CALCULATOR ─────────────────────────────
function openCalc(){
  if(!selectedChamber) return;
  const g = selectedChamber.geometry;
  const gl = selectedChamber.geology;
  const params = new URLSearchParams({
    H: g.height_H, W: g.width_W, L: g.length_L,
    l0: g.drawpoint_spacing, p: g.looseness, rho: g.density,
    cu: gl.cu_plan, au: gl.au_plan, ag: gl.ag_plan,
    tonnage: gl.tonnage_plan
  });
  window.location.href = 'index.html?' + params.toString();
}

// ─── CHART ──────────────────────────────────────────
function drawChart(){
  const canvas = document.getElementById('drawChart');
  if(!canvas || !selectedChamber) return;
  
  const recs = getChamberRecords(selectedChamber).reverse(); // chronological
  if(!recs.length) return;
  
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cw = rect.width;
  const ch = rect.height;
  
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle = col('--bg') || '#141312';
  ctx.fillRect(0,0,cw,ch);
  
  const pad = {top:30, right:80, bottom:50, left:60};
  const gw = cw - pad.left - pad.right;
  const gh = ch - pad.top - pad.bottom;
  
  // Compute cumulative tonnage and Cu data
  let cumTon = 0;
  const points = recs.map((r,i)=>{
    cumTon += (r.fact_t || 0);
    return { date: r.date_blast || `#${i+1}`, cumTon, cu: r.grade_fact?.cu || 0 };
  });
  
  const maxTon = Math.max(cumTon, selectedChamber.geology.tonnage_plan * 0.6, 100);
  const cuVals = points.map(p=>p.cu).filter(v=>v>0);
  const maxCu = cuVals.length ? Math.max(...cuVals) * 1.15 : 1;
  const minCu = cuVals.length ? Math.min(...cuVals) * 0.85 : 0;
  
  function px(i){ return pad.left + (i / Math.max(points.length-1, 1)) * gw; }
  function pyTon(v){ return pad.top + gh - (v / maxTon) * gh; }
  function pyCu(v){ return pad.top + gh - ((v - minCu) / (maxCu - minCu || 1)) * gh; }
  
  // Grid
  ctx.strokeStyle = col('--border') || 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  for(let i=0; i<=5; i++){
    const y = pad.top + (gh/5)*i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+gw, y); ctx.stroke();
    const tonVal = Math.round(maxTon * (5-i) / 5);
    ctx.fillStyle = col('--muted') || '#797876';
    ctx.font = '10px Inter,sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(tonVal.toLocaleString('ru-RU'), pad.left-5, y+3);
  }
  
  // X labels (show ~6 dates)
  const step = Math.max(1, Math.floor(points.length / 6));
  ctx.textAlign = 'center';
  ctx.fillStyle = col('--faint') || '#4a4948';
  ctx.font = '9px Inter,sans-serif';
  for(let i=0; i<points.length; i+=step){
    const x = px(i);
    ctx.save();
    ctx.translate(x, pad.top+gh+12);
    ctx.rotate(-0.5);
    ctx.fillText(points[i].date, 0, 0);
    ctx.restore();
  }
  
  // Cu Y axis (right)
  ctx.textAlign = 'left';
  for(let i=0; i<=4; i++){
    const v = minCu + (maxCu - minCu) * i / 4;
    const y = pyCu(v);
    ctx.fillStyle = '#d19900';
    ctx.font = '10px Inter,sans-serif';
    ctx.fillText(v.toFixed(2)+'%', pad.left+gw+5, y+3);
  }
  
  // Plan line (horizontal)
  if(selectedChamber.geology.tonnage_plan > 0){
    const planPct = 0.6; // 60% default
    const planTon = selectedChamber.geology.tonnage_plan * planPct;
    if(planTon <= maxTon){
      const planY = pyTon(planTon);
      ctx.save();
      ctx.setLineDash([6,4]);
      ctx.strokeStyle = col('--success') || '#6daa45';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(pad.left, planY); ctx.lineTo(pad.left+gw, planY); ctx.stroke();
      ctx.restore();
      ctx.fillStyle = col('--success') || '#6daa45';
      ctx.font = '10px Inter,sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('План 60%: ' + Math.round(planTon).toLocaleString('ru-RU') + ' т', pad.left+gw, planY-4);
    }
  }
  
  // Cumulative tonnage area + line
  ctx.beginPath();
  ctx.moveTo(px(0), pyTon(0));
  points.forEach((p,i)=>{ ctx.lineTo(px(i), pyTon(p.cumTon)); });
  ctx.lineTo(px(points.length-1), pyTon(0));
  ctx.closePath();
  ctx.fillStyle = 'rgba(79,152,163,0.12)';
  ctx.fill();
  
  ctx.beginPath();
  points.forEach((p,i)=>{ i===0 ? ctx.moveTo(px(0), pyTon(p.cumTon)) : ctx.lineTo(px(i), pyTon(p.cumTon)); });
  ctx.strokeStyle = col('--primary') || '#4f98a3';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Dots on tonnage line
  points.forEach((p,i)=>{
    ctx.fillStyle = col('--primary') || '#4f98a3';
    ctx.beginPath(); ctx.arc(px(i), pyTon(p.cumTon), 2.5, 0, Math.PI*2); ctx.fill();
  });
  
  // Cu line
  const cuPoints = points.filter(p=>p.cu>0);
  if(cuPoints.length > 1){
    ctx.beginPath();
    cuPoints.forEach((p,i)=>{
      const idx = points.indexOf(p);
      i===0 ? ctx.moveTo(px(idx), pyCu(p.cu)) : ctx.lineTo(px(idx), pyCu(p.cu));
    });
    ctx.strokeStyle = '#d19900';
    ctx.lineWidth = 1.8;
    ctx.stroke();
    
    cuPoints.forEach(p=>{
      const idx = points.indexOf(p);
      ctx.fillStyle = '#d19900';
      ctx.beginPath(); ctx.arc(px(idx), pyCu(p.cu), 2.5, 0, Math.PI*2); ctx.fill();
    });
  }
  
  // Axis labels
  ctx.fillStyle = col('--text') || '#cdccca';
  ctx.font = 'bold 11px Inter,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Дата', pad.left+gw/2, ch-4);
  
  ctx.save(); ctx.translate(12, pad.top+gh/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle = col('--primary') || '#4f98a3';
  ctx.fillText('Накопленный выпуск, т', 0, 0);
  ctx.restore();
  
  ctx.save(); ctx.translate(cw-6, pad.top+gh/2); ctx.rotate(Math.PI/2);
  ctx.fillStyle = '#d19900';
  ctx.fillText('Cu факт, %', 0, 0);
  ctx.restore();
  
  // Legend
  ctx.textAlign = 'left';
  ctx.font = '10px Inter,sans-serif';
  const legendItems = [
    [col('--primary')||'#4f98a3', 'Выпуск (т)'],
    ['#d19900', 'Cu факт (%)'],
    [col('--success')||'#6daa45', 'План']
  ];
  legendItems.forEach(([c,label],i)=>{
    const lx = pad.left + 10 + i*130;
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(lx, pad.top+10, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = col('--text')||'#cdccca';
    ctx.fillText(label, lx+8, pad.top+13);
  });
}

// ─── INIT ───────────────────────────────────────────
if(loadData()){
  populateFilters();
  renderList();
  // Auto-select first chamber
  if(chambers.length){
    selectChamber(chambers[0].id);
  }
} else {
  renderList();
}

window.addEventListener('resize', ()=>{ if(selectedChamber) drawChart(); });
</script>
